name: Update Filter Lists

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if upstream lists are unchanged'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Fetch, convert and commit updated lists
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run build pipeline
        run: python src/build.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet output/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Show diff summary
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "### Output file changes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git diff --stat output/ >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Rule counts:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- adblock.json: $(python -c "import json; print(len(json.load(open('output/adblock.json'))))")" >> "$GITHUB_STEP_SUMMARY"
          echo "- trackers.json: $(python -c "import json; print(len(json.load(open('output/trackers.json'))))")" >> "$GITHUB_STEP_SUMMARY"

      - name: Open pull request with updated lists
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-filter-lists
          delete-branch: true
          commit-message: |
            chore: weekly filter list update

            Automated regeneration from upstream sources:
            - EasyList  (https://easylist.to/easylist/easylist.txt)
            - EasyPrivacy (https://easylist.to/easylist/easyprivacy.txt)
            - uBlock Origin filters
            - Peter Lowe's Ad and tracking server list

            [skip ci]
          title: 'chore: weekly filter list update'
          body: |
            ## Weekly filter list update

            This PR was opened automatically by the **Update Filter Lists** workflow.

            ### Sources refreshed
            | List | URL |
            |---|---|
            | EasyList | https://easylist.to/easylist/easylist.txt |
            | EasyPrivacy | https://easylist.to/easylist/easyprivacy.txt |
            | uBlock Origin | https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/filters.txt |
            | Peter Lowe | https://pgl.yoyo.org/adservers/serverlist.php |

            ### Files changed
            | File | Purpose |
            |---|---|
            | `output/adblock.json` | WKContentRuleList — ad network blocking |
            | `output/trackers.json` | WKContentRuleList — tracker/analytics blocking |
            | `output/cosmetic.js` | WKUserScript — CSS hiding rules |

            ### Review checklist
            - [ ] Rule counts look reasonable (not suspiciously small or at the 149 000 cap)
            - [ ] No new CDN domains accidentally blocked
            - [ ] `cosmetic.js` size is under 500 KB

            ---
            *Generated by `src/build.py`. See [SWIFT_INTEGRATION.md](output/SWIFT_INTEGRATION.md) for wiring instructions.*
          labels: |
            automated
            filter-lists
          add-paths: |
            output/adblock.json
            output/trackers.json
            output/cosmetic.js

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes in output files — upstream lists are up to date."
